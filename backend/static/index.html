<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Mom Test Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: system-ui, Arial, sans-serif;
            margin: 24px;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 14px;
        }

        button {
            padding: 10px 14px;
            font-weight: 600;
        }

        .pill {
            padding: 4px 8px;
            border-radius: 999px;
            background: #f4f4f5;
        }

        .log {
            background: #0b1020;
            color: #e6e6f0;
            padding: 12px;
            border-radius: 8px;
            white-space: pre-wrap;
            min-height: 120px;
        }

        .muted {
            opacity: 0.7
        }
    </style>
</head>

<body>
    <h1>Mom Test Assistant</h1>
    <p class="muted">Paste context, click <b>Start Call</b>, then speak. The agent listens and sends whispered
        ElevenLabs hints when you skip a good MOM Test opportunity.</p>

    <label>Call context for the assistant (company, persona, hypothesis, risks):</label>
    <textarea id="context"></textarea>

    <div class="row" style="margin:12px 0;">
        <label>OpenAI voice:</label>
        <select id="oaiVoice">
            <option value="">(model default)</option>
            <option value="marin">Marin</option>
            <option value="cedar">Cedar</option>
        </select>
        <span class="pill" id="statePill">disconnected</span>
    </div>

    <div class="row" style="margin-bottom:12px;">
        <button id="startBtn">Start Call</button>
        <button id="stopBtn" disabled>Stop</button>
    </div>

    <div>
        <div class="muted" style="margin:8px 0;">Agent + whisper logs</div>
        <div class="log" id="log"></div>
    </div>

    <!-- Remote audio from OpenAI (assistant voice) -->
    <audio id="assistantAudio" autoplay></audio>
    <!-- Whisper channel (low volume) -->
    <audio id="whisperAudio" autoplay></audio>

    <script>
        const logEl = document.getElementById("log");
        const statePill = document.getElementById("statePill");
        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        const ctxEl = document.getElementById("context");
        const voiceEl = document.getElementById("oaiVoice");

        const assistantAudio = document.getElementById("assistantAudio");
        const whisperAudio = document.getElementById("whisperAudio");
        whisperAudio.volume = 0.35; // softer whisper

        let pc = null;
        let dc = null;
        let localStream = null;
        let lastWhisperAt = 0;
        const WHISPER_COOLDOWN_MS = 45_000; // "not too often"

        function log(...args) {
            const t = new Date().toLocaleTimeString();
            logEl.textContent += `[${t}] ${args.join(" ")}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setState(s) {
            statePill.textContent = s;
        }

        function cleanup() {
            try { dc && dc.close(); } catch { }
            try { pc && pc.close(); } catch { }
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            dc = null; pc = null;
            setState("disconnected");
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        async function start() {
            startBtn.disabled = true;
            setState("connecting");
            log("Requesting Realtime client secret…");

            const context = ctxEl.value || "";
            const voice = voiceEl.value || null;

            // 1) Mint ephemeral client_secret from FastAPI
            const mintRes = await fetch("/api/realtime", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ context, voice }),
            });
            const mint = await mintRes.json();
            if (!mintRes.ok) {
                log("Failed to mint client secret:", mint.error || mintRes.status);
                setState("disconnected");
                startBtn.disabled = false;
                return;
            }
            const clientSecret = mint.client_secret;
            log("Got client secret.");

            // 2) WebRTC setup
            pc = new RTCPeerConnection();
            pc.onconnectionstatechange = () => {
                log("pc state:", pc.connectionState);
                if (pc.connectionState === "connected") setState("connected");
                if (["failed", "disconnected", "closed"].includes(pc.connectionState)) cleanup();
            };

            // Remote audio from OpenAI
            pc.ontrack = (e) => {
                assistantAudio.srcObject = e.streams[0];
                assistantAudio.play().catch(() => { });
            };

            // Add microphone
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (e) {
                log("Mic permission error:", e.message);
                cleanup();
                return;
            }
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

            // Some stacks like a recvonly video transceiver (stabilizes SDP)
            pc.addTransceiver("video", { direction: "recvonly" });
            pc.addTransceiver("audio", { direction: "sendrecv" });

            // Data channel for Realtime events
            dc = pc.createDataChannel("oai-events");
            dc.onopen = () => {
                log("Data channel open.");
                // Nothing to send immediately; session (instructions+tools) was set server-side when minting.
            };
            dc.onmessage = (ev) => handleRealtimeMessage(ev);

            // Offer/Answer with OpenAI Realtime (using the ephemeral secret)
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            const sdpResp = await fetch("https://api.openai.com/v1/realtime?model=gpt-realtime", {
                method: "POST",
                headers: {
                    Authorization: `Bearer ${clientSecret}`,
                    "Content-Type": "application/sdp",
                },
                body: offer.sdp,
            });

            if (!sdpResp.ok) {
                const text = await sdpResp.text();
                log("SDP exchange failed:", text);
                cleanup();
                return;
            }

            const answer = { type: "answer", sdp: await sdpResp.text() };
            await pc.setRemoteDescription(answer);

            setState("connected");
            stopBtn.disabled = false;
            log("Connected. Start your call. I’ll whisper when there’s a good MOM Test opening.");
        }

        function parseMaybeJSON(s) {
            try { return JSON.parse(s); } catch { return null; }
        }

        // Aggregate function-call args across deltas
        const fnArgBuffers = {}; // call_id -> string

        async function handleRealtimeMessage(ev) {
            let msg = null;
            try { msg = JSON.parse(ev.data); } catch { return; }

            // Log some interesting events (optional)
            if (msg.type?.startsWith("response.") && msg.type.endsWith(".delta")) {
                // Skip noisy token deltas
            } else {
                // log("rx:", msg.type || "(no type)");
            }

            // Handle function calls (tool calls) over data channel.
            // The Realtime API's data channel events mirror the WebSocket API shapes.
            // We look for "*function_call*" events and accumulate args by call_id.
            if (msg.type && msg.type.includes("function_call")) {
                if (msg.type.endsWith(".arguments.delta")) {
                    const id = msg.call_id || msg.id || msg.response?.id || "unknown";
                    fnArgBuffers[id] = (fnArgBuffers[id] || "") + (msg.delta || msg.arguments_delta || "");
                }
                if (msg.type.endsWith(".completed")) {
                    const id = msg.call_id || msg.id || "unknown";
                    const raw = fnArgBuffers[id] || "";
                    delete fnArgBuffers[id];

                    // Extract tool info if present on this message
                    const toolName = msg.name || msg.function?.name || "unknown";
                    const argsObj = parseMaybeJSON(raw) || {};
                    if (toolName === "whisper_hint") {
                        maybePlayWhisper(argsObj);
                    }
                }
            }
        }

        async function maybePlayWhisper(args) {
            const now = Date.now();
            if (now - lastWhisperAt < WHISPER_COOLDOWN_MS) {
                log(" (cooldown) skipping whisper:", JSON.stringify(args));
                return;
            }
            lastWhisperAt = now;

            const hint = (args?.hint || "").trim();
            const follow = (args?.followup_question || "").trim();
            if (!hint && !follow) return;

            const text = (follow ? `${hint}. ${follow}` : hint).slice(0, 240);
            log("whisper ▶", `"${text}"`);

            try {
                const resp = await fetch("/api/whisper", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text }),
                });

                if (!resp.ok) {
                    const t = await resp.text();
                    log("whisper error:", t);
                    return;
                }

                const blob = await resp.blob();
                whisperAudio.src = URL.createObjectURL(blob);
                await whisperAudio.play().catch(() => { });
            } catch (e) {
                log("whisper exception:", e.message);
            }
        }

        startBtn.addEventListener("click", start);
        stopBtn.addEventListener("click", cleanup);
    </script>
</body>

</html>
